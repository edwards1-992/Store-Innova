<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Innovatech</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .login-container{

            width:350px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 10px 25px rgba(0,0,0,0.2);

            animation:fadeIn .5s ease;
        }

        .login-container h1{

            text-align:center;

            margin-bottom:30px;

            color:#333;
        }

        .login-container input{

            width:100%;

            padding:14px;

            margin-bottom:15px;

            border:none;

            border-radius:10px;

            background:#f1f1f1;

            font-size:15px;
        }

        .login-container button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#667eea;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:.3s;
        }

        .login-container button:hover{

            background:#5a67d8;
        }

        .registro{

            margin-top:20px;

            text-align:center;
        }

        .registro a{

            color:#667eea;

            text-decoration:none;

            font-weight:bold;
        }

        #error{

            color:red;

            margin-top:15px;

            text-align:center;
        }

        @keyframes fadeIn{

            from{

                opacity:0;
                transform:translateY(-20px);
            }

            to{

                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>
            Iniciar Sesión
        </h1>

        <input
            type="text"
            id="usuario"
            placeholder="Usuario"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <button onclick="login()">
            Ingresar
        </button>

        <div class="registro">

            ¿No tienes cuenta?

            <a href="registro.html">
                Registrarse
            </a>

        </div>

        <p id="error"></p>

    </div>

    <script>

        async function login() {

            const usuario =
                document.getElementById(
                    "usuario"
                ).value;

            const password =
                document.getElementById(
                    "password"
                ).value;

            try {

                const response = await fetch(

                    "http://localhost:3000/login",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":
                            "application/json"
                        },

                        body:JSON.stringify({

                            usuario,
                            password

                        })
                    }
                );

                const data =
                    await response.json();

                if(data.ok){

                    localStorage.setItem(

                        "usuario",

                        JSON.stringify(
                            data.usuario
                        )
                    );

                    localStorage.setItem(
                        "auth",
                        "true"
                    );

                    window.location.href =
                        "index.html";


                }else{

                    document.getElementById(
                        "error"
                    ).innerText =
                        data.mensaje;
                }

            } catch(error){

                console.log(error);

                document.getElementById(
                    "error"
                ).innerText =
                    "Error de conexión";
            }
        }

    </script>

</body>

</html>
