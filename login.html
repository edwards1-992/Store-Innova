<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); }
        .login-container { width:380px; max-width:90%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(12px); padding:40px 32px; border-radius:20px; animation:fadeIn .5s ease; }
        .login-container h1 { text-align:center; margin-bottom:8px; color:white; font-size:24px; }
        .login-container .subtitle { text-align:center; margin-bottom:28px; color:rgba(255,255,255,0.4); font-size:14px; }
        .login-container input { width:100%; padding:14px 16px; margin-bottom:14px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; background:rgba(255,255,255,0.05); color:white; font-size:15px; outline:none; transition:0.3s; }
        .login-container input:focus { border-color:rgba(59,130,246,0.5); background:rgba(255,255,255,0.08); }
        .login-container input::placeholder { color:rgba(255,255,255,0.3); }
        .login-container button { width:100%; padding:14px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); }
        .login-container button:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(59,130,246,0.4); }
        .registro { margin-top:20px; text-align:center; color:rgba(255,255,255,0.4); font-size:14px; }
        .registro a { color:#60a5fa; text-decoration:none; font-weight:600; }
        #error { color:#f87171; margin-top:14px; text-align:center; font-size:14px; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Iniciar Sesion</h1>
        <p class="subtitle">Bienvenido de vuelta</p>
        <input type="text" id="usuario" placeholder="Usuario" autocomplete="off">
        <input type="password" id="password" placeholder="Contrasena">
        <button onclick="login()">Ingresar</button>
        <div class="registro">¿No tienes cuenta? <a href="registro.html">Registrarse</a></div>
        <p id="error"></p>
    </div>
    <script>
    async function login(){
        const usuario=document.getElementById("usuario").value;
        const password=document.getElementById("password").value;
        try{
            const response=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({usuario,password})});
            const data=await response.json();
            if(data.ok){ localStorage.setItem("usuario",JSON.stringify(data.usuario));localStorage.setItem("auth","true");window.location.href="index.html"; }
            else{ document.getElementById("error").innerText=data.mensaje; }
        }catch(error){ document.getElementById("error").innerText="Error de conexion"; }
    }
    </script>
</body>
</html>
