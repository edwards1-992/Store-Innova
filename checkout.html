<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Checkout - Innovatech</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            min-height:100vh;
        }

        /* =========================================
           NAVBAR
        ========================================= */

        .navbar{

            width:100%;
            padding:20px 40px;

            display:grid;
            grid-template-columns:1fr auto 1fr;
            align-items:center;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);

            position:sticky;
            top:0;
            z-index:1000;
        }

        .navbar h2{
            justify-self:start;
        }

        .menu{
            justify-self:center;
            display:flex;
            gap:15px;
        }

        .menu a{

            text-decoration:none;
            color:white;

            padding:12px 20px;
            border-radius:8px;

            background: rgba(255,255,255,0.15);
            transition:0.3s;
        }

        .menu a:hover{
            background: rgba(255,255,255,0.25);
        }

        .user{
            justify-self:end;
            display:flex;
            gap:10px;
            align-items:center;
        }

        .user button{

            padding:10px 15px;
            border:none;
            border-radius:8px;

            cursor:pointer;

            background:white;
            color:#667eea;

            font-weight:bold;
        }

        /* =========================================
           CONTENIDO
        ========================================= */

        .container{
            max-width:900px;
            margin:40px auto;
            background: rgba(255,255,255,0.1);
            padding:30px;
            border-radius:15px;
            backdrop-filter: blur(10px);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .user-box{
            background:white;
            color:#333;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .item{
            background:white;
            color:#333;
            padding:15px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .total{
            text-align:right;
            font-size:24px;
            margin-top:20px;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:white;
            color:#667eea;
            font-weight:bold;
            cursor:pointer;
        }

    </style>
</head>

<body>

<!-- =========================================
     NAVBAR
========================================== -->

<nav class="navbar">

    <h2>Innovatech</h2>

    <div class="menu">

        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="mis_pedidos.html">Mis pedidos</a>

    </div>

    <div class="user">

        <span id="user-name">Invitado</span>

        <button id="btn-auth" onclick="authAction()">
            Iniciar Sesión
        </button>

    </div>

</nav>

<!-- =========================================
     CHECKOUT
========================================== -->

<div class="container">

    <h1>Confirmar Pedido</h1>

    <div class="user-box" id="user-box">
        Cargando datos...
    </div>

    <div id="resumen"></div>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <button onclick="confirmarPedido()">
        Confirmar Pedido
    </button>

</div>

<script>

    // =========================================
    // SESIÓN NAVBAR
    // =========================================

    const auth = localStorage.getItem('auth');
    const usuario = JSON.parse(localStorage.getItem('usuario'));

    const userName = document.getElementById('user-name');
    const btnAuth = document.getElementById('btn-auth');

    if(auth === 'true' && usuario){

        userName.innerText = usuario.nombres;

        btnAuth.innerText = "Cerrar sesión";

    }else{

        userName.innerText = "Invitado";

        btnAuth.innerText = "Iniciar sesión";
    }

    function authAction(){

        if(auth === 'true'){

            localStorage.removeItem('auth');
            localStorage.removeItem('usuario');

            window.location.href = "index.html";

        }else{

            window.location.href = "login.html";
        }
    }

    // =========================================
    // VALIDAR LOGIN
    // =========================================

    if(auth !== 'true' || !usuario){
        alert("Debes iniciar sesión");
        window.location.href = "login.html";
    }

    // =========================================
    // DATOS USUARIO
    // =========================================

    document.getElementById('user-box').innerHTML = `
        <strong>Datos de Facturación</strong><br><br>

        Nombre: ${usuario.nombres || ''}<br>
        Apellidos: ${usuario.apellidos || ''}<br>
        Celular: ${usuario.celular || ''}<br>
        Dirección: ${usuario.direccion || ''}
    `;

    // =========================================
    // RESUMEN PEDIDO
    // =========================================

    const pedido = JSON.parse(localStorage.getItem('pedido_actual')) || [];

    const resumen = document.getElementById('resumen');

    let total = 0;

    pedido.forEach(p => {

        total += p.precio * p.cantidad;

        resumen.innerHTML += `
            <div class="item">
                <strong>${p.nombre}</strong><br>
                Cantidad: ${p.cantidad}<br>
                Precio: $${p.precio}
            </div>
        `;
    });

    document.getElementById('total').innerText = total;

    // =========================================
    // CONFIRMAR PEDIDO
    // =========================================

    async function confirmarPedido() {

        const auth = localStorage.getItem('auth');
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        const pedido = JSON.parse(localStorage.getItem('pedido_actual')) || [];

        if (auth !== 'true' || !usuario) {
            alert("Debes iniciar sesión");
            window.location.href = "login.html";
            return;
        }

        if (pedido.length === 0) {
            alert("Carrito vacío");
            return;
        }

        const total = pedido.reduce((acc, p) =>
            acc + (p.precio * p.cantidad), 0
        );

        try {

            const response = await fetch("http://localhost:3000/ventas", {

                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario: usuario.usuario,
                    total: total,
                    productos: pedido
                })
            });

            const data = await response.json();

            if (data.ok) {

                localStorage.removeItem('carrito');
                localStorage.removeItem('pedido_actual');

                alert("Pedido confirmado 🎉 N° Venta: " + data.venta_id);

                window.location.href = "index.html";

            } else {
                alert("Error al guardar venta");
            }

        } catch (error) {
            console.log(error);
            alert("Error de conexión con el servidor");
        }
    }

</script>

</body>
</html>
