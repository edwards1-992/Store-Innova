<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        .navbar { width:100%; padding:0 40px; height:80px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.06); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:1000; transition:all 0.3s; }
        .navbar.scrolled { background:rgba(15,23,42,0.95); box-shadow:0 4px 30px rgba(0,0,0,0.4); }
        .logo { display:flex; align-items:center; }
        .logo img { height:85px; }
        .menu { display:flex; gap:6px; }
        .menu a { text-decoration:none; color:rgba(255,255,255,0.85); padding:10px 20px; border-radius:8px; background:rgba(255,255,255,0.08); transition:all 0.3s; font-size:14px; font-weight:500; border:1px solid transparent; }
        .menu a:hover { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.3); color:white; }
        .usuario-info { display:flex; align-items:center; gap:14px; }
        .usuario-info span { font-weight:600; font-size:14px; color:rgba(255,255,255,0.7); }
        .usuario-info button { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:0.3s; }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; }

        .container { max-width:700px; margin:50px auto; padding:0 16px; }
        .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:32px; backdrop-filter:blur(8px); }
        .card h1 { text-align:center; margin-bottom:24px; font-size:24px; }
        .user-box { background:rgba(255,255,255,0.08); padding:16px; border-radius:10px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.08); font-size:14px; line-height:1.7; color:rgba(255,255,255,0.7); }
        .item { background:rgba(255,255,255,0.05); padding:14px; border-radius:10px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.06); }
        .total { text-align:right; font-size:22px; font-weight:700; margin-top:20px; color:#60a5fa; }
        .btn-confirm { width:100%; padding:16px; margin-top:24px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:16px; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); }
        .btn-confirm:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(59,130,246,0.4); }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:40px; }

        @media(max-width:768px){
            .navbar { padding:0 12px; height:auto; min-height:70px; flex-wrap:wrap; gap:8px; }
            .logo img { height:65px; }
            .hamburger { display:flex; }
            .menu { position:fixed; top:0; right:-100%; width:80%; max-width:300px; height:100vh; background:rgba(15,23,42,0.98); flex-direction:column; padding:100px 24px 24px; gap:10px; transition:right 0.3s; z-index:999; border-left:1px solid rgba(255,255,255,0.08); }
            .menu.open { right:0; }
            .menu a { width:100%; text-align:center; padding:16px; font-size:16px; border-radius:12px; }
            .usuario-info { position:fixed; bottom:0; left:0; width:100%; justify-content:center; padding:16px; background:rgba(15,23,42,0.98); z-index:999; border-top:1px solid rgba(255,255,255,0.1); }
            .usuario-info span { display:none; }
            .usuario-info button { width:100%; max-width:340px; padding:16px; font-size:16px; border-radius:12px; }
            .container { padding:0 12px; margin:20px auto; }
            .card { padding:20px; border-radius:14px; }
            .card h1 { font-size:20px; }
            footer { padding:20px 16px; font-size:12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><img src="img/Logo moderno InnovaT.png" alt="Innovatech"></a>
    <div class="menu" id="menu">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="mis_pedidos.html">Mis pedidos</a>
    </div>
    <div class="usuario-info">
        <span id="user-name">Invitado</span>
        <button id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
    </div>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="container">
    <div class="card">
        <h1>Confirmar Pedido</h1>
        <div class="user-box" id="user-box">Cargando datos...</div>
        <div id="resumen"></div>
        <div class="total">Total: $<span id="total">0</span></div>
        <button class="btn-confirm" onclick="confirmarPedido()">Confirmar Pedido</button>
    </div>
</div>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script>
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const userName=document.getElementById('user-name'),btnAuth=document.getElementById('btn-auth');
if(auth==='true'&&usuario){ userName.innerText=usuario.nombres;btnAuth.innerText="Cerrar sesion"; }
else{ userName.innerText="Invitado";btnAuth.innerText="Iniciar sesion"; }
function authAction(){ if(auth==='true'){ localStorage.removeItem('auth');localStorage.removeItem('usuario');window.location.href="index.html"; }else{ window.location.href="login.html"; } }
function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }
window.addEventListener('scroll',function(){ document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>20); });

if(auth!=='true'||!usuario){ alert("Debes iniciar sesion");window.location.href="login.html"; }
document.getElementById('user-box').innerHTML=`<strong>Datos de Facturacion</strong><br><br>Nombre: ${usuario.nombres||''}<br>Apellidos: ${usuario.apellidos||''}<br>Celular: ${usuario.celular||''}<br>Direccion: ${usuario.direccion||''}`;

const pedido=JSON.parse(localStorage.getItem('pedido_actual'))||[];
const resumen=document.getElementById('resumen');let total=0;
pedido.forEach(p=>{ total+=p.precio*p.cantidad; resumen.innerHTML+=`<div class="item"><strong>${p.nombre}</strong><br>Cantidad: ${p.cantidad}<br>Precio: $${p.precio}</div>`; });
document.getElementById('total').innerText=total;

async function confirmarPedido(){
    const a=localStorage.getItem('auth'),u=JSON.parse(localStorage.getItem('usuario')),ped=JSON.parse(localStorage.getItem('pedido_actual'))||[];
    if(a!=='true'||!u){ alert("Debes iniciar sesion");window.location.href="login.html";return; }
    if(ped.length===0){ alert("Carrito vacio");return; }
    const t=ped.reduce((acc,p)=>acc+(p.precio*p.cantidad),0);
    try{
        const response=await fetch("/ventas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({usuario:u.usuario,total:t,productos:ped})});
        const data=await response.json();
        if(data.ok){ localStorage.removeItem('carrito');localStorage.removeItem('pedido_actual');alert("Pedido confirmado! N° Venta: "+data.venta_id);window.location.href="index.html"; }
        else{ alert("Error al guardar venta"); }
    }catch(e){ console.log(e);alert("Error de conexion"); }
}
</script>
</body>
</html>
