<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        #navbar { position:fixed; top:0; left:0; right:0; z-index:1000; background:rgba(15,23,42,0.92); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.06); }
        .nav-inner { display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:80px; }
        .logo-img { height:100px; width:auto; object-fit:contain; transition:0.3s; cursor:pointer; }
        .logo-img:hover { transform:scale(1.04); }
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.7); padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; transition:0.3s; }
        .nav-links a:hover { color:white; background:rgba(255,255,255,0.08); }
        .nav-actions { display:flex; align-items:center; gap:12px; }
        .usuario-btn { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:0.3s; white-space:nowrap; }
        .usuario-btn:hover { transform:translateY(-1px); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; }
        .mobile-nav { display:none; flex-direction:column; gap:4px; padding:16px 24px 20px; border-top:1px solid rgba(255,255,255,0.06); background:rgba(15,23,42,0.98); }
        .mobile-nav.open { display:flex; }
        .mobile-nav a { text-decoration:none; color:rgba(255,255,255,0.7); padding:14px 16px; border-radius:10px; font-size:16px; font-weight:500; }
        .mobile-nav .usuario-btn { width:100%; text-align:center; margin-top:8px; }

        .container { max-width:700px; margin:120px auto 50px; padding:0 16px; }
        .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:32px; backdrop-filter:blur(8px); }
        .card h1 { text-align:center; margin-bottom:24px; font-size:24px; }
        .user-box { background:rgba(255,255,255,0.08); padding:16px; border-radius:10px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.08); font-size:14px; line-height:1.7; color:rgba(255,255,255,0.7); }
        .item { background:rgba(255,255,255,0.05); padding:14px; border-radius:10px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.06); }
        .total { text-align:right; font-size:22px; font-weight:700; margin-top:20px; color:#60a5fa; }
        .btn-confirm { width:100%; padding:16px; margin-top:24px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:16px; cursor:pointer; transition:0.3s; }
        .btn-confirm:hover { transform:translateY(-2px); }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:20px; }

        @media(max-width:768px){
            .nav-inner { padding:0 16px; height:60px; }
            .logo-img { height:45px; }
            .nav-links { display:none; }
            .hamburger { display:flex; }
            .nav-actions .usuario-btn { display:none; }
            .container { margin:90px auto 30px; }
            .card { padding:20px; }
            .card h1 { font-size:20px; }
            footer { padding:20px 16px; font-size:12px; }
        }
        @media(max-width:480px){ .logo-img { height:38px; } .mobile-nav a { font-size:15px; } }
    </style>
</head>
<body>
<nav id="navbar">
    <div class="nav-inner">
        <img src="img/Logo moderno InnovaT.png" alt="Innovatech" class="logo-img" onclick="location.href='index.html'">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="mis_pedidos.html">Mis pedidos</a>
        </div>
        <div class="nav-actions">
            <button class="usuario-btn" id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
            <button class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></button>
        </div>
    </div>
    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="mis_pedidos.html">Mis pedidos</a>
        <button class="usuario-btn" id="btn-auth-mob" onclick="authAction()">Iniciar Sesion</button>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>Confirmar Pedido</h1>
        <div class="user-box" id="user-box">Cargando datos...</div>
        <div id="resumen"></div>
        <div class="total">Total: $<span id="total">0</span></div>
        <button class="btn-confirm" onclick="confirmarPedido()">Confirmar Pedido</button>
    </div>
</div>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script>
function toggleMobile(){ document.getElementById('mobileNav').classList.toggle('open'); }
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const btn=document.getElementById('btn-auth'),btnMob=document.getElementById('btn-auth-mob');
if(auth==='true'&&usuario){ btn.innerText="Cerrar sesion";btnMob.innerText="Cerrar sesion"; }
else{ btn.innerText="Iniciar sesion";btnMob.innerText="Iniciar sesion"; }
function authAction(){ if(auth==='true'){ localStorage.removeItem('auth');localStorage.removeItem('usuario');window.location.href="index.html"; }else{ window.location.href="login.html"; } }

if(auth!=='true'||!usuario){ alert("Debes iniciar sesion");window.location.href="login.html"; }
document.getElementById('user-box').innerHTML=`<strong>Datos de Facturacion</strong><br><br>Nombre: ${usuario.nombres||''}<br>Apellidos: ${usuario.apellidos||''}<br>Celular: ${usuario.celular||''}<br>Direccion: ${usuario.direccion||''}`;

const pedido=JSON.parse(localStorage.getItem('pedido_actual'))||[];
const resumen=document.getElementById('resumen');let total=0;
pedido.forEach(p=>{ total+=p.precio*p.cantidad; resumen.innerHTML+=`<div class="item"><strong>${p.nombre}</strong><br>Cantidad: ${p.cantidad}<br>Precio: $${p.precio}</div>`; });
document.getElementById('total').innerText=total;

async function confirmarPedido(){
    const a=localStorage.getItem('auth'),u=JSON.parse(localStorage.getItem('usuario')),ped=JSON.parse(localStorage.getItem('pedido_actual'))||[];
    if(a!=='true'||!u){ alert("Debes iniciar sesion");window.location.href="login.html";return; }
    if(ped.length===0){ alert("Carrito vacio");return; }
    const t=ped.reduce((acc,p)=>acc+(p.precio*p.cantidad),0);
    try{
        const response=await fetch("/ventas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({usuario:u.usuario,total:t,productos:ped})});
        const data=await response.json();
        if(data.ok){ localStorage.removeItem('carrito');localStorage.removeItem('pedido_actual');alert("Pedido confirmado! N° Venta: "+data.venta_id);window.location.href="index.html"; }
        else{ alert("Error al guardar venta"); }
    }catch(e){ alert("Error de conexion"); }
}
</script>
</body>
</html>
