<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Innovatech</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:linear-gradient(135deg,#667eea,#764ba2); color:white; min-height:100vh; }

        .navbar {
            width:100%; padding:20px 40px;
            display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
            position:sticky; top:0; z-index:1000;
        }
        .logo { justify-self:start; }
        .logo img { height:50px; }
        .menu { justify-self:center; display:flex; gap:15px; }
        .menu a { text-decoration:none; color:white; padding:12px 20px; border-radius:8px; background:rgba(255,255,255,0.15); transition:0.3s; }
        .menu a:hover { background:rgba(255,255,255,0.25); }
        .user { justify-self:end; display:flex; gap:10px; align-items:center; }
        .user button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:white; color:#667eea; font-weight:bold; }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; justify-self:end; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; transition:0.3s; }

        .container { max-width:900px; margin:40px auto; padding:0 16px; background:rgba(255,255,255,0.1); padding:30px; border-radius:15px; backdrop-filter:blur(10px); }
        h1 { text-align:center; margin-bottom:20px; }
        .user-box { background:white; color:#333; padding:15px; border-radius:10px; margin-bottom:20px; }
        .item { background:white; color:#333; padding:15px; border-radius:10px; margin-bottom:10px; }
        .total { text-align:right; font-size:24px; margin-top:20px; }
        button { width:100%; padding:15px; margin-top:20px; border:none; border-radius:10px; background:white; color:#667eea; font-weight:bold; cursor:pointer; }

        footer { text-align:center; padding:20px; background:rgba(0,0,0,0.2); margin-top:40px; }

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px){
            .navbar { padding:12px 16px; }
            .logo img { height:40px; }
            .hamburger { display:flex; }
            .menu {
                position:fixed; top:0; right:-100%; width:75%; max-width:280px;
                height:100vh; background:rgba(20,20,30,0.98); backdrop-filter:blur(10px);
                flex-direction:column; padding:80px 20px 20px; gap:10px;
                transition:right 0.3s ease; z-index:999;
            }
            .menu.open { right:0; }
            .menu a { width:100%; text-align:center; padding:14px; font-size:16px; }
            .user { position:fixed; bottom:0; left:0; width:100%; justify-content:center; padding:12px 16px; background:rgba(20,20,30,0.95); z-index:999; }
            .user button { width:100%; max-width:300px; padding:14px; font-size:16px; }
            .container { padding:20px 16px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><img src="img/Logo moderno InnovaT.png" alt="Innovatech"></a>
    <div class="menu" id="menu">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="mis_pedidos.html">Mis pedidos</a>
    </div>
    <div class="user">
        <span id="user-name">Invitado</span>
        <button id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
    </div>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="container">
    <h1>Confirmar Pedido</h1>
    <div class="user-box" id="user-box">Cargando datos...</div>
    <div id="resumen"></div>
    <div class="total">Total: $<span id="total">0</span></div>
    <button onclick="confirmarPedido()">Confirmar Pedido</button>
</div>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script>
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const userName=document.getElementById('user-name'),btnAuth=document.getElementById('btn-auth');
if(auth==='true'&&usuario){ userName.innerText=usuario.nombres;btnAuth.innerText="Cerrar sesion"; }
else{ userName.innerText="Invitado";btnAuth.innerText="Iniciar sesion"; }
function authAction(){ if(auth==='true'){ localStorage.removeItem('auth');localStorage.removeItem('usuario');window.location.href="index.html"; }else{ window.location.href="login.html"; } }
function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }

if(auth!=='true'||!usuario){ alert("Debes iniciar sesion");window.location.href="login.html"; }

document.getElementById('user-box').innerHTML=`<strong>Datos de Facturacion</strong><br><br>Nombre: ${usuario.nombres||''}<br>Apellidos: ${usuario.apellidos||''}<br>Celular: ${usuario.celular||''}<br>Direccion: ${usuario.direccion||''}`;

const pedido=JSON.parse(localStorage.getItem('pedido_actual'))||[];
const resumen=document.getElementById('resumen');let total=0;
pedido.forEach(p=>{ total+=p.precio*p.cantidad; resumen.innerHTML+=`<div class="item"><strong>${p.nombre}</strong><br>Cantidad: ${p.cantidad}<br>Precio: $${p.precio}</div>`; });
document.getElementById('total').innerText=total;

async function confirmarPedido(){
    const a=localStorage.getItem('auth'),u=JSON.parse(localStorage.getItem('usuario')),ped=JSON.parse(localStorage.getItem('pedido_actual'))||[];
    if(a!=='true'||!u){ alert("Debes iniciar sesion");window.location.href="login.html";return; }
    if(ped.length===0){ alert("Carrito vacio");return; }
    const t=ped.reduce((acc,p)=>acc+(p.precio*p.cantidad),0);
    try{
        const response=await fetch("/ventas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({usuario:u.usuario,total:t,productos:ped})});
        const data=await response.json();
        if(data.ok){ localStorage.removeItem('carrito');localStorage.removeItem('pedido_actual');alert("Pedido confirmado! N° Venta: "+data.venta_id);window.location.href="index.html"; }
        else{ alert("Error al guardar venta"); }
    }catch(e){ console.log(e);alert("Error de conexion"); }
}
</script>
</body>
</html>
