<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mis Pedidos - Innovatech</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            min-height:100vh;
        }

        /* =========================================
           NAVBAR
        ========================================= */

        .navbar{

            width:100%;
            padding:20px 40px;

            display:grid;
            grid-template-columns:1fr auto 1fr;
            align-items:center;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);

            position:sticky;
            top:0;
            z-index:1000;
        }

        .navbar h2{
            justify-self:start;
        }

        .menu{
            justify-self:center;
            display:flex;
            gap:15px;
        }

        .menu a{

            text-decoration:none;
            color:white;

            padding:12px 20px;
            border-radius:8px;

            background: rgba(255,255,255,0.15);
            transition:0.3s;
        }

        .menu a:hover{
            background: rgba(255,255,255,0.25);
        }

        .user{
            justify-self:end;
            display:flex;
            gap:10px;
            align-items:center;
        }

        .user button{

            padding:10px 15px;
            border:none;
            border-radius:8px;

            cursor:pointer;

            background:white;
            color:#667eea;

            font-weight:bold;
        }

        /* =========================================
           CONTENIDO
        ========================================= */

        .container{
            max-width:900px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .pedido{
            background:white;
            color:#333;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .producto{
            background:#f3f3f3;
            padding:10px;
            margin-top:10px;
            border-radius:8px;
        }

        .total{
            margin-top:10px;
            text-align:right;
            font-weight:bold;
        }

    </style>
</head>

<body>

<!-- =========================================
     NAVBAR
========================================== -->

<nav class="navbar">

    <h2>Innovatech</h2>

    <div class="menu">

        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>

    </div>

    <div class="user">

        <span id="user-name">Invitado</span>

        <button id="btn-auth" onclick="authAction()">
            Iniciar Sesión
        </button>

    </div>

</nav>

<!-- =========================================
     CONTENIDO
========================================== -->

<div class="container">

    <h1>Mis Pedidos</h1>

    <div id="lista"></div>

</div>

<script>

    // =========================================
    // SESIÓN
    // =========================================

    const auth = localStorage.getItem('auth');
    const usuario = JSON.parse(localStorage.getItem('usuario'));

    const userName = document.getElementById('user-name');
    const btnAuth = document.getElementById('btn-auth');

    if(auth === 'true' && usuario){

        userName.innerText = usuario.nombres;

        btnAuth.innerText = "Cerrar sesión";

    }else{

        userName.innerText = "Invitado";

        btnAuth.innerText = "Iniciar sesión";
    }

    function authAction(){

        if(auth === 'true'){

            localStorage.removeItem('auth');
            localStorage.removeItem('usuario');

            window.location.href = "index.html";

        }else{

            window.location.href = "login.html";
        }
    }

    // =========================================
    // VALIDAR LOGIN
    // =========================================

    if(auth !== 'true' || !usuario){
        alert("Debes iniciar sesión");
        window.location.href = "login.html";
    }

    // =========================================
    // CARGAR PEDIDOS
    // =========================================

    async function cargarPedidos(){

        try{

            const res = await fetch(
                `/mis-ventas-detalle/${usuario.usuario}`
            );

            const data = await res.json();

            const lista = document.getElementById('lista');

            if(!data.ok){
                lista.innerHTML = "Error";
                return;
            }

            if(data.ventas.length === 0){
                lista.innerHTML = "<p>No tienes pedidos</p>";
                return;
            }

            data.ventas.forEach(v => {

                let html = "";

                v.detalles.forEach(p => {

                    html += `
                        <div class="producto">
                            <strong>${p.producto}</strong><br>
                            Cantidad: ${p.cantidad}<br>
                            Precio: $${p.precio}<br>
                            Subtotal: $${p.subtotal}
                        </div>
                    `;
                });

                lista.innerHTML += `
                    <div class="pedido">
                        <h3>Pedido #${v.venta_id}</h3>
                        <p>Fecha: ${new Date(v.fecha).toLocaleString()}</p>

                        ${html}

                        <div class="total">
                            Total: $${v.total}
                        </div>
                    </div>
                `;
            });

        }catch(error){
            console.log(error);
        }
    }

    cargarPedidos();

</script>

</body>
</html>
