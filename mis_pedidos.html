<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        .navbar { width:100%; padding:0 40px; height:80px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.06); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:1000; transition:all 0.3s; }
        .navbar.scrolled { background:rgba(15,23,42,0.95); box-shadow:0 4px 30px rgba(0,0,0,0.4); }
        .logo { display:flex; align-items:center; }
        .logo img { height:55px; }
        .menu { display:flex; gap:6px; }
        .menu a { text-decoration:none; color:rgba(255,255,255,0.85); padding:10px 20px; border-radius:8px; background:rgba(255,255,255,0.08); transition:all 0.3s; font-size:14px; font-weight:500; border:1px solid transparent; }
        .menu a:hover { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.3); color:white; }
        .usuario-info { display:flex; align-items:center; gap:14px; }
        .usuario-info span { font-weight:600; font-size:14px; color:rgba(255,255,255,0.7); }
        .usuario-info button { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:0.3s; }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; }

        .container { max-width:800px; margin:50px auto; padding:0 16px; }
        .container h1 { text-align:center; margin-bottom:30px; font-size:28px; }
        .pedido { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px; margin-bottom:20px; backdrop-filter:blur(8px); }
        .pedido h3 { font-size:18px; margin-bottom:8px; color:#60a5fa; }
        .pedido .fecha { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:14px; }
        .producto-item { background:rgba(255,255,255,0.05); padding:12px; margin-top:8px; border-radius:8px; font-size:14px; border:1px solid rgba(255,255,255,0.06); }
        .pedido-total { margin-top:14px; text-align:right; font-weight:700; font-size:18px; color:#60a5fa; }
        .empty { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.4); }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:40px; }

        @media(max-width:768px){
            .navbar { padding:0 16px; height:70px; }
            .logo img { height:45px; }
            .hamburger { display:flex; }
            .menu { position:fixed; top:0; right:-100%; width:75%; max-width:280px; height:100vh; background:rgba(15,23,42,0.98); flex-direction:column; padding:90px 20px 20px; gap:8px; transition:right 0.3s; z-index:999; border-left:1px solid rgba(255,255,255,0.08); }
            .menu.open { right:0; }
            .menu a { width:100%; text-align:center; padding:14px; }
            .usuario-info { position:fixed; bottom:0; left:0; width:100%; justify-content:center; padding:14px 16px; background:rgba(15,23,42,0.95); z-index:999; border-top:1px solid rgba(255,255,255,0.08); }
            .usuario-info span { display:none; }
            .usuario-info button { width:100%; max-width:300px; padding:14px; }
            .container { padding:0 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><img src="img/Logo moderno InnovaT.png" alt="Innovatech"></a>
    <div class="menu" id="menu">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
    </div>
    <div class="usuario-info">
        <span id="user-name">Invitado</span>
        <button id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
    </div>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="container">
    <h1>Mis Pedidos</h1>
    <div id="lista"></div>
</div>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script>
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const userName=document.getElementById('user-name'),btnAuth=document.getElementById('btn-auth');
if(auth==='true'&&usuario){ userName.innerText=usuario.nombres;btnAuth.innerText="Cerrar sesion"; }
else{ userName.innerText="Invitado";btnAuth.innerText="Iniciar sesion"; }
function authAction(){ if(auth==='true'){ localStorage.removeItem('auth');localStorage.removeItem('usuario');window.location.href="index.html"; }else{ window.location.href="login.html"; } }
function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }
window.addEventListener('scroll',function(){ document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>20); });

if(auth!=='true'||!usuario){ alert("Debes iniciar sesion");window.location.href="login.html"; }

async function cargarPedidos(){
    try{
        const res=await fetch(`/mis-ventas-detalle/${usuario.usuario}`);
        const data=await res.json();
        const lista=document.getElementById('lista');
        if(!data.ok){ lista.innerHTML='<div class="empty">Error al cargar</div>';return; }
        if(data.ventas.length===0){ lista.innerHTML='<div class="empty"><h2>Sin pedidos</h2><p>Aun no has realizado ninguna compra.</p></div>';return; }
        data.ventas.forEach(v=>{
            let html="";
            v.detalles.forEach(p=>{ html+=`<div class="producto-item"><strong>${p.producto}</strong> - Cant: ${p.cantidad} - $${p.precio} - Subtotal: $${p.subtotal}</div>`; });
            lista.innerHTML+=`<div class="pedido"><h3>Pedido #${v.venta_id}</h3><p class="fecha">${new Date(v.fecha).toLocaleDateString('es-DO',{day:'numeric',month:'long',year:'numeric'})}</p>${html}<div class="pedido-total">Total: $${v.total}</div></div>`;
        });
    }catch(e){ console.log(e); }
}
cargarPedidos();
</script>
</body>
</html>
