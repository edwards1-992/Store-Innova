<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); padding:20px; }
        .card { width:420px; max-width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(12px); padding:32px; border-radius:20px; }
        .card h2 { text-align:center; margin-bottom:24px; font-size:22px; color:white; }
        .card input { width:100%; padding:12px 14px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; background:rgba(255,255,255,0.05); color:white; font-size:14px; outline:none; transition:0.3s; }
        .card input:focus { border-color:rgba(59,130,246,0.5); background:rgba(255,255,255,0.08); }
        .card input::placeholder { color:rgba(255,255,255,0.3); }
        .card button { width:100%; padding:14px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); }
        .card button:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(59,130,246,0.4); }
        .mensaje { margin-top:14px; text-align:center; color:rgba(255,255,255,0.5); font-size:14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Registrarse</h2>
    <input type="text" id="nombres" placeholder="Nombres">
    <input type="text" id="apellidos" placeholder="Apellidos">
    <input type="text" id="cedula" placeholder="Cedula" maxlength="16">
    <input type="text" id="celular" placeholder="Celular" maxlength="9">
    <input type="text" id="direccion" placeholder="Direccion">
    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contrasena">
    <button onclick="registrar()">Registrarse</button>
    <p class="mensaje" id="mensaje"></p>
</div>
<script>
const txtCedula=document.getElementById('cedula');
txtCedula.addEventListener('input',function(){
    let v=this.value.toUpperCase().replace(/[^0-9A-Z]/g,'');let letra='';
    if(/[A-Z]$/.test(v)){letra=v.slice(-1);v=v.slice(0,-1);}
    v=v.substring(0,13);let r='';
    if(v.length<=3)r=v;else if(v.length<=9)r=v.substring(0,3)+'-'+v.substring(3);else r=v.substring(0,3)+'-'+v.substring(3,9)+'-'+v.substring(9,13);
    this.value=r+letra;
});
const txtCelular=document.getElementById('celular');
txtCelular.addEventListener('input',function(){let v=this.value.replace(/\D/g,'').substring(0,8);if(v.length>4)v=v.substring(0,4)+'-'+v.substring(4);this.value=v;});
async function registrar(){
    const data={nombres:document.getElementById('nombres').value,apellidos:document.getElementById('apellidos').value,cedula:document.getElementById('cedula').value,celular:document.getElementById('celular').value,direccion:document.getElementById('direccion').value,usuario:document.getElementById('usuario').value,password:document.getElementById('password').value};
    const response=await fetch('/registro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const result=await response.json();
    if(result.ok){alert('Usuario registrado correctamente');window.location.href='login.html';}else{alert(result.mensaje);}
}
</script>
</body>
</html>
