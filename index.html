<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        #navbar {
            position:fixed; top:0; left:0; right:0; z-index:1000;
            background:rgba(15,23,42,0.92); backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .nav-inner { display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:80px; }
        .logo-img { height:100px; width:auto; object-fit:contain; transition:0.3s; }
        .logo-img:hover { transform:scale(1.04); filter:drop-shadow(0 0 10px rgba(59,130,246,0.3)); }
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.7); padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; transition:0.3s; }
        .nav-links a:hover { color:white; background:rgba(255,255,255,0.08); }
        .nav-actions { display:flex; align-items:center; gap:12px; }
        .usuario-btn { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); white-space:nowrap; }
        .usuario-btn:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(59,130,246,0.4); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; transition:0.3s; }
        .mobile-nav { display:none; flex-direction:column; gap:4px; padding:16px 24px 20px; border-top:1px solid rgba(255,255,255,0.06); background:rgba(15,23,42,0.98); }
        .mobile-nav.open { display:flex; }
        .mobile-nav a { text-decoration:none; color:rgba(255,255,255,0.7); padding:14px 16px; border-radius:10px; font-size:16px; font-weight:500; transition:0.3s; }
        .mobile-nav a:hover { color:white; background:rgba(255,255,255,0.08); }
        .mobile-nav .usuario-btn { width:100%; text-align:center; margin-top:8px; }

        .hero { width:100%; text-align:center; padding:120px 20px 60px; margin-top:80px; }
        .hero h1 { font-size:52px; font-weight:800; margin-bottom:16px; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .hero p { font-size:18px; opacity:0.7; max-width:600px; margin:0 auto; line-height:1.6; }

        .productos-container { width:92%; max-width:1200px; margin:auto; padding:40px 0 60px; }
        .productos-titulo { text-align:center; margin-bottom:40px; font-size:28px; font-weight:700; }

        .productos { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:24px; }
        .producto { background:rgba(255,255,255,0.05); border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.08); transition:all 0.3s; backdrop-filter:blur(8px); }
        .producto:hover { transform:translateY(-6px); border-color:rgba(59,130,246,0.3); box-shadow:0 20px 40px rgba(0,0,0,0.3); }
        .producto a { text-decoration:none; color:inherit; }
        .producto img { width:100%; height:220px; object-fit:cover; display:block; }
        .producto-info { padding:20px; }
        .producto-info h3 { font-size:16px; font-weight:600; margin-bottom:6px; }
        .producto-info p { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:12px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .precio { font-size:22px; font-weight:700; color:#60a5fa; }
        .producto button { width:100%; padding:12px; margin-top:14px; border:none; border-radius:8px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:14px; cursor:pointer; transition:0.3s; }
        .producto button:hover { box-shadow:0 4px 15px rgba(59,130,246,0.4); }

        .carrito-widget { position:fixed; top:100px; right:24px; z-index:999; }
        #carrito-icono { background:rgba(255,255,255,0.08); color:white; padding:14px 18px; border-radius:12px; cursor:pointer; font-weight:600; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); transition:0.3s; }
        #carrito-icono:hover { background:rgba(59,130,246,0.2); }
        #carrito-panel { margin-top:10px; background:rgba(30,41,59,0.95); color:white; width:320px; max-height:420px; overflow-y:auto; padding:20px; border-radius:14px; backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        .oculto { display:none; }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:20px; }

        @media(max-width:768px){
            .nav-inner { padding:0 16px; height:60px; }
            .logo-img { height:45px; }
            .nav-links { display:none; }
            .hamburger { display:flex; }
            .nav-actions .usuario-btn { display:none; }
            .hero { padding:100px 16px 30px; margin-top:60px; }
            .hero h1 { font-size:28px; }
            .hero p { font-size:14px; }
            .productos-container { width:95%; padding:20px 0 80px; }
            .productos-titulo { font-size:22px; margin-bottom:20px; }
            .productos { grid-template-columns:1fr; gap:16px; }
            .producto img { height:180px; }
            .producto-info { padding:16px; }
            .carrito-widget { top:auto; bottom:90px; right:12px; }
            #carrito-panel { width:calc(100vw - 24px); max-width:320px; }
            footer { padding:20px 16px; font-size:12px; }
        }
        @media(max-width:480px){
            .hero h1 { font-size:24px; }
            .logo-img { height:38px; }
            .mobile-nav a { font-size:15px; padding:12px 14px; }
        }
    </style>
</head>
<body>
<nav id="navbar">
    <div class="nav-inner">
        <img src="img/Logo moderno InnovaT.png" alt="Innovatech" class="logo-img" onclick="location.href='index.html'" style="cursor:pointer;">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a id="link-registro-nav" href="registro.html">Registrarse</a>
            <a href="mis_pedidos.html" id="link-mis-pedidos-nav" style="display:none;">Mis pedidos</a>
        </div>
        <div class="nav-actions">
            <button class="usuario-btn" id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
            <button class="hamburger" onclick="toggleMobile()" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
    </div>
    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a id="link-registro-mob" href="registro.html">Registrarse</a>
        <a href="mis_pedidos.html" id="link-mis-pedidos-mob" style="display:none;">Mis pedidos</a>
        <button class="usuario-btn" id="btn-auth-mob" onclick="authAction()">Iniciar Sesion</button>
    </div>
</nav>

<section class="hero">
    <h1>Innovatech</h1>
    <p>Equipos tecnologicos de alto rendimiento para gamers, profesionales y empresas.</p>
</section>

<section class="productos-container">
    <h2 class="productos-titulo">Equipos y Accesorios</h2>
    <div class="productos" id="contenedor-productos"></div>
</section>

<div class="carrito-widget">
    <div id="carrito-icono">&#x1F6D2; <span id="carrito-contador">0</span></div>
    <div id="carrito-panel" class="oculto">
        <h3>Carrito</h3>
        <ul id="lista-carrito"></ul>
        <p id="mensaje-vacio">Sin productos</p>
        <p>Total: $<span id="total">0</span></p>
        <button id="btn-pagar" onclick="irCheckout()" style="width:100%;margin-top:15px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;font-weight:600;cursor:pointer;">Pagar</button>
    </div>
</div>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script>
function toggleMobile(){ document.getElementById('mobileNav').classList.toggle('open'); }
function irLogin(){ window.location.href='login.html'; }
function logout(){ localStorage.removeItem('auth');localStorage.removeItem('usuario');alert('Sesion cerrada');window.location.href='index.html'; }
function authAction(){ localStorage.getItem('auth')==='true'?logout():irLogin(); }
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const labelDesktop=document.getElementById('btn-auth'),labelMobile=document.getElementById('btn-auth-mob');
const linkMob=document.getElementById('link-mis-pedidos-mob'),linkNav=document.getElementById('link-mis-pedidos-nav');
const linkRegMob=document.getElementById('link-registro-mob'),linkRegNav=document.getElementById('link-registro-nav');
if(auth==='true'&&usuario){
    labelDesktop.innerText='Cerrar Sesion';labelMobile.innerText='Cerrar Sesion';
    if(linkMob)linkMob.style.display='inline-block';if(linkNav)linkNav.style.display='inline-block';
    if(linkRegMob)linkRegMob.style.display='none';if(linkRegNav)linkRegNav.style.display='none';
}else{
    labelDesktop.innerText='Iniciar Sesion';labelMobile.innerText='Iniciar Sesion';
    if(linkMob)linkMob.style.display='none';if(linkNav)linkNav.style.display='none';
    if(linkRegMob)linkRegMob.style.display='inline-block';if(linkRegNav)linkRegNav.style.display='inline-block';
}
window.addEventListener('scroll',function(){ document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20); });

async function cargarProductos(){
    try{
        const response=await fetch('/productos');
        const productos=await response.json();
        const contenedor=document.getElementById('contenedor-productos');
        contenedor.innerHTML='';
        productos.forEach(p=>{
            contenedor.innerHTML+=`<div class="producto"><a href="producto.html?nombre=${encodeURIComponent(p.nombre)}&precio=${p.precio}&img=${encodeURIComponent(p.imagen)}&descripcion=${encodeURIComponent(p.descripcion)}"><img src="img/${p.imagen}" alt="${p.nombre}" loading="lazy"><div class="producto-info"><h3>${p.nombre}</h3><p>${p.descripcion}</p><div class="precio">$${p.precio}</div><button type="button">Ver Producto</button></div></a></div>`;
        });
    }catch(e){ console.log('Error:',e); }
}
cargarProductos();
</script>
<script src="js/carrito.js"></script>
</body>
</html>
