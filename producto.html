<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        #navbar { position:fixed; top:0; left:0; right:0; z-index:1000; background:rgba(15,23,42,0.92); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.06); }
        .nav-inner { display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:80px; }
        .logo-img { height:100px; width:auto; object-fit:contain; transition:0.3s; cursor:pointer; }
        .logo-img:hover { transform:scale(1.04); }
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { text-decoration:none; color:rgba(255,255,255,0.7); padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; transition:0.3s; }
        .nav-links a:hover { color:white; background:rgba(255,255,255,0.08); }
        .nav-actions { display:flex; align-items:center; gap:12px; }
        .usuario-btn { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:0.3s; white-space:nowrap; }
        .usuario-btn:hover { transform:translateY(-1px); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; }
        .mobile-nav { display:none; flex-direction:column; gap:4px; padding:16px 24px 20px; border-top:1px solid rgba(255,255,255,0.06); background:rgba(15,23,42,0.98); }
        .mobile-nav.open { display:flex; }
        .mobile-nav a { text-decoration:none; color:rgba(255,255,255,0.7); padding:14px 16px; border-radius:10px; font-size:16px; font-weight:500; }
        .mobile-nav .usuario-btn { width:100%; text-align:center; margin-top:8px; }

        .producto-container { width:92%; max-width:1100px; margin:120px auto 50px; background:rgba(255,255,255,0.05); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:40px; display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; }
        .producto-imagen img { width:100%; border-radius:16px; background:rgba(255,255,255,0.05); padding:20px; border:1px solid rgba(255,255,255,0.08); }
        .producto-info h1 { font-size:36px; font-weight:700; margin-bottom:16px; }
        .producto-info p { font-size:16px; line-height:1.7; margin-bottom:12px; color:rgba(255,255,255,0.6); }
        .precio { font-size:38px; font-weight:800; margin:20px 0; color:#60a5fa; }
        .formulario { display:flex; flex-direction:column; gap:16px; margin-top:20px; }
        .formulario input { padding:14px 16px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; font-size:16px; outline:none; background:rgba(255,255,255,0.05); color:white; transition:0.3s; }
        .formulario input:focus { border-color:rgba(59,130,246,0.5); }
        .formulario button { padding:16px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; }
        .formulario button:hover { transform:translateY(-2px); }

        .carrito-widget { position:fixed; top:100px; right:24px; z-index:999; }
        #carrito-icono { background:rgba(255,255,255,0.08); color:white; padding:14px 18px; border-radius:12px; cursor:pointer; font-weight:600; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); }
        #carrito-panel { margin-top:10px; background:rgba(30,41,59,0.95); color:white; width:300px; padding:20px; border-radius:14px; backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        .oculto { display:none; }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:30px; }

        @media(max-width:768px){
            .nav-inner { padding:0 16px; height:60px; }
            .logo-img { height:45px; }
            .nav-links { display:none; }
            .hamburger { display:flex; }
            .nav-actions .usuario-btn { display:none; }
            .producto-container { grid-template-columns:1fr; padding:20px; margin:90px auto 20px; }
            .producto-info h1 { font-size:24px; }
            .producto-info p { font-size:14px; }
            .precio { font-size:28px; }
            .carrito-widget { top:auto; bottom:90px; right:12px; }
            footer { padding:20px 16px; font-size:12px; }
        }
        @media(max-width:480px){ .logo-img { height:38px; } .mobile-nav a { font-size:15px; } }
    </style>
</head>
<body>
<nav id="navbar">
    <div class="nav-inner">
        <img src="img/Logo moderno InnovaT.png" alt="Innovatech" class="logo-img" onclick="location.href='index.html'">
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a id="link-registro-nav" href="registro.html">Registrarse</a>
            <a href="mis_pedidos.html" id="link-mis-pedidos-nav" style="display:none;">Mis pedidos</a>
        </div>
        <div class="nav-actions">
            <button class="usuario-btn" id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
            <button class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></button>
        </div>
    </div>
    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a id="link-registro-mob" href="registro.html">Registrarse</a>
        <a href="mis_pedidos.html" id="link-mis-pedidos-mob" style="display:none;">Mis pedidos</a>
        <button class="usuario-btn" id="btn-auth-mob" onclick="authAction()">Iniciar Sesion</button>
    </div>
</nav>

<div class="carrito-widget">
    <div id="carrito-icono">&#x1F6D2; <span id="carrito-contador">0</span></div>
    <div id="carrito-panel" class="oculto">
        <h3>Carrito</h3>
        <ul id="lista-carrito"></ul>
        <p id="mensaje-vacio">Sin productos</p>
        <p>Total: $<span id="total">0</span></p>
        <button id="btn-pagar" onclick="irCheckout()" style="width:100%;margin-top:15px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;font-weight:600;cursor:pointer;">Pagar</button>
    </div>
</div>

<main class="producto-container">
    <div class="producto-imagen"><img id="producto-img" src="img/default.png"></div>
    <div class="producto-info">
        <h1 id="producto-nombre">Producto</h1>
        <p id="producto-descripcion">Descripcion del producto</p>
        <div class="precio" id="producto-precio">$0</div>
        <form class="formulario" id="form-carrito">
            <input type="number" id="cantidad" min="1" value="1">
            <button type="submit">Agregar al carrito</button>
        </form>
    </div>
</main>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script src="js/producto.js"></script>
<script src="js/carrito.js"></script>
<script>
function toggleMobile(){ document.getElementById('mobileNav').classList.toggle('open'); }
function irLogin(){ window.location.href='login.html'; }
function logout(){ localStorage.removeItem('auth');localStorage.removeItem('usuario');alert('Sesion cerrada');window.location.href='index.html'; }
function authAction(){ localStorage.getItem('auth')==='true'?logout():irLogin(); }
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const btn=document.getElementById('btn-auth'),btnMob=document.getElementById('btn-auth-mob');
const linkMob=document.getElementById('link-mis-pedidos-mob'),linkNav=document.getElementById('link-mis-pedidos-nav');
const linkRegMob=document.getElementById('link-registro-mob'),linkRegNav=document.getElementById('link-registro-nav');
if(auth==='true'&&usuario){
    btn.innerText='Cerrar Sesion';btnMob.innerText='Cerrar Sesion';
    if(linkMob)linkMob.style.display='inline-block';if(linkNav)linkNav.style.display='inline-block';
    if(linkRegMob)linkRegMob.style.display='none';if(linkRegNav)linkRegNav.style.display='none';
}else{
    btn.innerText='Iniciar Sesion';btnMob.innerText='Iniciar Sesion';
    if(linkMob)linkMob.style.display='none';if(linkNav)linkNav.style.display='none';
    if(linkRegMob)linkRegMob.style.display='inline-block';if(linkRegNav)linkRegNav.style.display='inline-block';
}
</script>
</body>
</html>
