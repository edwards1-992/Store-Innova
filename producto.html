<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - Innovatech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { min-height:100vh; background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#334155 100%); color:white; }

        .navbar {
            width:100%; padding:0 40px; height:80px;
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(255,255,255,0.06); backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:1000;
            transition:all 0.3s ease;
        }
        .navbar.scrolled { background:rgba(15,23,42,0.95); box-shadow:0 4px 30px rgba(0,0,0,0.4); }
        .logo { display:flex; align-items:center; }
        .logo img { height:85px; transition:0.3s; }
        .logo:hover img { transform:scale(1.05); }
        .menu { display:flex; gap:6px; }
        .menu a { text-decoration:none; color:rgba(255,255,255,0.85); padding:10px 20px; border-radius:8px; background:rgba(255,255,255,0.08); transition:all 0.3s; font-size:14px; font-weight:500; border:1px solid transparent; }
        .menu a:hover { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.3); color:white; transform:translateY(-1px); }
        .usuario-info { display:flex; align-items:center; gap:14px; }
        .usuario-info span { font-weight:600; font-size:14px; color:rgba(255,255,255,0.7); }
        .usuario-info button { padding:10px 22px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-weight:600; font-size:13px; transition:all 0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); }
        .usuario-info button:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(59,130,246,0.4); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; transition:0.3s; }

        .producto-container {
            width:92%; max-width:1100px; margin:50px auto;
            background:rgba(255,255,255,0.05); backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:40px;
            display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center;
            animation:fadeIn 0.6s ease-in-out;
        }
        .producto-imagen img { width:100%; border-radius:16px; background:rgba(255,255,255,0.05); padding:20px; border:1px solid rgba(255,255,255,0.08); }
        .producto-info h1 { font-size:36px; font-weight:700; margin-bottom:16px; }
        .producto-info p { font-size:16px; line-height:1.7; margin-bottom:12px; color:rgba(255,255,255,0.6); }
        .precio { font-size:38px; font-weight:800; margin:20px 0; color:#60a5fa; }
        .formulario { display:flex; flex-direction:column; gap:16px; margin-top:20px; }
        .formulario input { padding:14px 16px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; font-size:16px; outline:none; background:rgba(255,255,255,0.05); color:white; transition:0.3s; }
        .formulario input:focus { border-color:rgba(59,130,246,0.5); background:rgba(255,255,255,0.08); }
        .formulario button { padding:16px; border:none; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; box-shadow:0 2px 10px rgba(59,130,246,0.3); }
        .formulario button:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(59,130,246,0.4); }

        .carrito-widget { position:fixed; top:100px; right:24px; z-index:1000; }
        #carrito-icono { background:rgba(255,255,255,0.08); color:white; padding:14px 18px; border-radius:12px; cursor:pointer; font-weight:600; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); transition:0.3s; }
        #carrito-panel { margin-top:10px; background:rgba(30,41,59,0.95); color:white; width:300px; padding:20px; border-radius:14px; backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        .oculto { display:none; }

        footer { text-align:center; padding:24px 20px; color:rgba(255,255,255,0.4); font-size:13px; border-top:1px solid rgba(255,255,255,0.06); margin-top:20px; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }

        /* RESPONSIVE */
        @media(max-width:900px){
            .navbar { padding:0 12px; height:auto; min-height:70px; flex-wrap:wrap; gap:8px; }
            .logo img { height:65px; }
            .hamburger { display:flex; }
            .menu { position:fixed; top:0; right:-100%; width:80%; max-width:300px; height:100vh; background:rgba(15,23,42,0.98); backdrop-filter:blur(16px); flex-direction:column; padding:100px 24px 24px; gap:10px; transition:right 0.3s ease; z-index:999; border-left:1px solid rgba(255,255,255,0.08); }
            .menu.open { right:0; }
            .menu a { width:100%; text-align:center; padding:16px; font-size:16px; border-radius:12px; }
            .usuario-info { position:fixed; bottom:0; left:0; width:100%; justify-content:center; padding:16px; background:rgba(15,23,42,0.98); z-index:999; border-top:1px solid rgba(255,255,255,0.1); }
            .usuario-info span { display:none; }
            .usuario-info button { width:100%; max-width:340px; padding:16px; font-size:16px; border-radius:12px; }
            .producto-container { grid-template-columns:1fr; padding:20px; margin:20px auto; }
            .producto-info h1 { font-size:24px; }
            .producto-info p { font-size:14px; }
            .precio { font-size:28px; }
            .carrito-widget { top:auto; bottom:90px; right:12px; }
            footer { padding:20px 16px; font-size:12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><img src="img/Logo moderno InnovaT.png" alt="Innovatech"></a>
    <div class="menu" id="menu">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a id="link-registro" href="registro.html">Registrarse</a>
        <a href="mis_pedidos.html" id="link-mis-pedidos" style="display:none;">Mis pedidos</a>
    </div>
    <div class="usuario-info">
        <span id="usuario-logeado">Invitado</span>
        <button id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
    </div>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="carrito-widget">
    <div id="carrito-icono">&#x1F6D2; <span id="carrito-contador">0</span></div>
    <div id="carrito-panel" class="oculto">
        <h3>Carrito</h3>
        <ul id="lista-carrito"></ul>
        <p id="mensaje-vacio">Sin productos</p>
        <p>Total: $<span id="total">0</span></p>
        <button id="btn-pagar" onclick="irCheckout()" style="width:100%;margin-top:15px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;font-weight:600;cursor:pointer;">Pagar</button>
    </div>
</div>

<main class="producto-container">
    <div class="producto-imagen"><img id="producto-img" src="img/default.png"></div>
    <div class="producto-info">
        <h1 id="producto-nombre">Producto</h1>
        <p id="producto-descripcion">Descripcion del producto</p>
        <div class="precio" id="producto-precio">$0</div>
        <form class="formulario" id="form-carrito">
            <input type="number" id="cantidad" min="1" value="1">
            <button type="submit">Agregar al carrito</button>
        </form>
    </div>
</main>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script src="js/producto.js"></script>
<script src="js/carrito.js"></script>
<script>
window.addEventListener('scroll',function(){ document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>20); });
function irLogin(){ window.location.href='login.html'; }
function logout(){ localStorage.removeItem('auth');localStorage.removeItem('usuario');alert('Sesion cerrada');window.location.href='index.html'; }
function authAction(){ localStorage.getItem('auth')==='true'?logout():irLogin(); }
function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const label=document.getElementById('usuario-logeado'),btn=document.getElementById('btn-auth'),lp=document.getElementById('link-mis-pedidos');
if(auth==='true'&&usuario){ label.innerText='Bienvenido, '+usuario.nombres;btn.innerText='Cerrar Sesion';if(lp)lp.style.display='inline-block'; }
else{ label.innerText='Invitado';btn.innerText='Iniciar Sesion';if(lp)lp.style.display='none'; }
</script>
</body>
</html>
