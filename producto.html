<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - Innovatech</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { min-height:100vh; background:linear-gradient(135deg,#667eea,#764ba2); color:white; }

        .navbar {
            width:100%; padding:20px 40px;
            display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
            position:sticky; top:0; z-index:1000;
            transition:all 0.3s ease;
        }
        .navbar.scrolled { background:rgba(20,20,30,0.95); box-shadow:0 10px 25px rgba(0,0,0,0.35); }
        .navbar h2 { font-size:28px; justify-self:start; }
        .logo { justify-self:start; }
        .logo img { height:50px; }
        .menu { display:flex; gap:15px; justify-self:center; align-items:center; }
        .menu a { text-decoration:none; color:white; padding:12px 20px; border-radius:8px; background:rgba(255,255,255,0.15); transition:0.3s; }
        .menu a:hover { background:rgba(255,255,255,0.25); transform:translateY(-2px); }
        .usuario-info { display:flex; align-items:center; gap:10px; justify-self:end; }
        .usuario-info span { font-weight:bold; }
        .usuario-info button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:white; color:#667eea; font-weight:bold; }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; justify-self:end; }
        .hamburger span { width:24px; height:2px; background:white; border-radius:2px; transition:0.3s; }

        .producto-container {
            width:90%; max-width:1200px; margin:50px auto;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
            border-radius:20px; padding:40px;
            display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center;
            animation:fadeIn 0.6s ease-in-out;
        }
        .producto-imagen img { width:100%; border-radius:20px; background:white; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .producto-info h1 { font-size:42px; margin-bottom:20px; }
        .producto-info p { font-size:18px; line-height:1.7; margin-bottom:15px; }
        .precio { font-size:40px; font-weight:bold; margin:25px 0; color:#fff; }
        .formulario { display:flex; flex-direction:column; gap:20px; margin-top:20px; }
        .formulario input { padding:15px; border:none; border-radius:10px; font-size:16px; outline:none; }
        .formulario button { padding:15px; border:none; border-radius:10px; background:#ffffff; color:#667eea; font-size:18px; font-weight:bold; cursor:pointer; }

        .carrito-widget { position:fixed; top:100px; right:20px; z-index:1000; }
        #carrito-icono { background:white; color:#667eea; padding:15px 20px; border-radius:12px; cursor:pointer; font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
        #carrito-panel { margin-top:10px; background:white; color:#333; width:300px; padding:20px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
        .oculto { display:none; }

        footer { text-align:center; padding:20px; background:rgba(0,0,0,0.2); margin-top:50px; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }

        /* ===== RESPONSIVE ===== */
        @media(max-width:900px){
            .producto-container { grid-template-columns:1fr; padding:24px; }
            .navbar { grid-template-columns:1fr auto 1fr; padding:12px 16px; }
            .logo img { height:40px; }
            .hamburger { display:flex; }
            .menu {
                position:fixed; top:0; right:-100%; width:75%; max-width:280px;
                height:100vh; background:rgba(20,20,30,0.98); backdrop-filter:blur(10px);
                flex-direction:column; padding:80px 20px 20px; gap:10px;
                transition:right 0.3s ease; z-index:999;
            }
            .menu.open { right:0; }
            .menu a { width:100%; text-align:center; padding:14px; font-size:16px; }
            .usuario-info { position:fixed; bottom:0; left:0; width:100%; justify-content:center; padding:12px 16px; background:rgba(20,20,30,0.95); z-index:999; }
            .usuario-info span { display:none; }
            .usuario-info button { width:100%; max-width:300px; padding:14px; font-size:16px; }
            .producto-info h1 { font-size:28px; }
            .precio { font-size:30px; }
            .carrito-widget { top:auto; bottom:80px; right:12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><img src="img/Logo moderno InnovaT.png" alt="Innovatech"></a>
    <div class="menu" id="menu">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a id="link-registro" href="registro.html">Registrarse</a>
        <a href="mis_pedidos.html" id="link-mis-pedidos" style="display:none;">Mis pedidos</a>
    </div>
    <div class="usuario-info">
        <span id="usuario-logeado">Invitado</span>
        <button id="btn-auth" onclick="authAction()">Iniciar Sesion</button>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="carrito-widget">
    <div id="carrito-icono">&#x1F6D2; <span id="carrito-contador">0</span></div>
    <div id="carrito-panel" class="oculto">
        <h3>Carrito</h3>
        <ul id="lista-carrito"></ul>
        <p id="mensaje-vacio">Sin productos</p>
        <p>Total: $<span id="total">0</span></p>
        <button id="btn-pagar" onclick="irCheckout()" style="width:100%;margin-top:15px;padding:12px;border:none;border-radius:10px;background:#667eea;color:white;font-weight:bold;cursor:pointer;">Pagar</button>
    </div>
</div>

<main class="producto-container">
    <div class="producto-imagen"><img id="producto-img" src="img/default.png"></div>
    <div class="producto-info">
        <h1 id="producto-nombre">Producto</h1>
        <p id="producto-descripcion">Descripcion del producto</p>
        <div class="precio" id="producto-precio">$0</div>
        <form class="formulario" id="form-carrito">
            <input type="number" id="cantidad" min="1" value="1">
            <button type="submit">Agregar al carrito</button>
        </form>
    </div>
</main>

<footer><p>&copy; 2026 Innovatech - Todos los derechos reservados</p></footer>

<script src="js/producto.js"></script>
<script src="js/carrito.js"></script>
<script>
window.addEventListener('scroll',function(){ document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>20); });
function irLogin(){ window.location.href='login.html'; }
function logout(){ localStorage.removeItem('auth');localStorage.removeItem('usuario');alert('Sesion cerrada');window.location.href='index.html'; }
function authAction(){ localStorage.getItem('auth')==='true'?logout():irLogin(); }
function toggleMenu(){ document.getElementById('menu').classList.toggle('open'); }
const auth=localStorage.getItem('auth'),usuario=JSON.parse(localStorage.getItem('usuario'));
const label=document.getElementById('usuario-logeado'),btn=document.getElementById('btn-auth'),lp=document.getElementById('link-mis-pedidos');
if(auth==='true'&&usuario){ label.innerText='Bienvenido, '+usuario.nombres;btn.innerText='Cerrar Sesion';if(lp)lp.style.display='inline-block'; }
else{ label.innerText='Invitado';btn.innerText='Iniciar Sesion';if(lp)lp.style.display='none'; }
</script>
</body>
</html>
